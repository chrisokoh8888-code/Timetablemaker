<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TimelyClass Dashboard</title>
<style>
/* ---------- Global ---------- */
body { font-family: Arial, sans-serif; margin: 0; padding: 1rem; background: #f9fafb; }
h2 { margin-bottom: 0.5rem; }
.dashboard-section { margin-bottom: 2rem; }
.table-controls { display: flex; justify-content: space-between; margin-bottom: 0.5rem; }
.search-input { padding: 0.5rem; border-radius: 8px; border: 1px solid #d1d5db; }
/* ---------- Table ---------- */
.table-wrapper { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
thead th { position: sticky; top: 0; background: #ffffff; text-align: left; padding: 0.5rem; border-bottom: 2px solid #e5e7eb; cursor: pointer; }
tbody td { padding: 0.5rem; border-bottom: 1px solid #e5e7eb; }
tbody tr:hover { background: #f3f4f6; transition: background 0.2s; }
/* ---------- Skeleton ---------- */
.table-skeleton, .feed-skeleton { display: block; margin-bottom: 1rem; }
.skeleton-row { background: linear-gradient(90deg,#e5e7eb 25%,#f3f4f6 50%,#e5e7eb 75%); background-size: 200% 100%; border-radius: 8px; height: 40px; animation: shimmer 1.5s infinite; margin-bottom: 0.5rem; }
@keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
/* ---------- Empty States ---------- */
.empty-state { text-align: center; padding: 2rem; color: #6b7280; font-size: 1rem; background: #f3f4f6; border-radius: 8px; margin-bottom: 1rem; }
/* ---------- Row Animations ---------- */
tr.added { opacity: 0; transform: translateY(-10px); animation: fadeInRow 0.4s forwards; }
@keyframes fadeInRow { to { opacity: 1; transform: translateY(0); } }
tr.updated { animation: highlightUpdate 1s ease forwards; }
@keyframes highlightUpdate { 0% { background-color:#fef3c7; transform: scale(1.02); } 50% { background-color:#fef3c7; transform: scale(1); } 100% { background-color:transparent; } }
/* ---------- Feed ---------- */
.activity-feed { display: flex; flex-direction: column; }
.activity-item { padding: 0.5rem; margin-bottom: 0.3rem; border-radius: 8px; background: #fff; display:flex; justify-content: space-between; transition: transform 0.3s, opacity 0.3s; }
.activity-item.added { opacity: 0; transform: translateX(-20px); animation: fadeInFeed 0.4s forwards; }
@keyframes fadeInFeed { to { opacity:1; transform: translateX(0); } }
/* ---------- Pagination ---------- */
.pagination { display: flex; justify-content: center; margin-top: 0.5rem; }
.pagination button { margin: 0 0.5rem; padding: 0.3rem 0.6rem; border-radius:6px; border:1px solid #d1d5db; cursor:pointer; }
.pagination button:hover { background:#e5e7eb; }
/* ---------- Responsive ---------- */
@media (max-width: 600px) { table, tbody, thead, th, td, tr { display:block; } thead tr { display:none; } tbody tr { margin-bottom: 1rem; border:1px solid #e5e7eb; border-radius:8px; padding:0.5rem; } tbody td { border:none; padding:0.5rem 0; } tbody td:before { content: attr(data-label) ": "; font-weight:bold; } }
</style>
</head>
<body>

<section class="dashboard-section">
<h2>Users</h2>
<div class="table-controls">
<input type="text" id="searchInput" placeholder="Search..." class="search-input">
<button id="exportBtn">Export CSV</button>
</div>
<div id="tableSkeleton" class="table-skeleton">
<div class="skeleton-row"></div>
<div class="skeleton-row"></div>
<div class="skeleton-row"></div>
</div>
<div class="table-wrapper">
<table id="userTable">
<thead>
<tr>
<th data-column="id">User ID</th>
<th data-column="name">Name</th>
<th data-column="location">Location</th>
<th data-column="device">Device</th>
<th data-column="sessionTime">Session Time</th>
<th data-column="actions">Actions Taken</th>
<th data-column="status">Status</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>
<div id="emptyTable" class="empty-state" style="display:none;">No users found 😔</div>
<div class="pagination">
<button id="prevPage">Prev</button>
<span id="pageInfo"></span>
<button id="nextPage">Next</button>
</div>
</section>

<section class="dashboard-section">
<h2>Activity Feed</h2>
<div id="feedSkeleton" class="feed-skeleton">
<div class="skeleton-row"></div>
<div class="skeleton-row"></div>
<div class="skeleton-row"></div>
</div>
<div id="activityFeed" class="activity-feed"></div>
<div id="emptyFeed" class="empty-state" style="display:none;">No activity yet 😔</div>
</section>

<script>
// ---------- Data ----------
let users=[], filteredUsers=[], currentPage=1, rowsPerPage=5, events=[];
for(let i=1;i<=30;i++){users.push({id:i,name:`User ${i}`,location:["Lagos","Abuja","Kano"][i%3],device:["Mobile","Desktop"][i%2],sessionTime:`${10+i} mins`,actions:i%5,status:["Active","Inactive"][i%2]});}
filteredUsers=[...users];

// ---------- Elements ----------
const tableBody=document.querySelector("#userTable tbody"), pageInfo=document.querySelector("#pageInfo"),
tableSkeleton=document.getElementById("tableSkeleton"), emptyTable=document.getElementById("emptyTable"),
feed=document.getElementById("activityFeed"), feedSkeleton=document.getElementById("feedSkeleton"), emptyFeed=document.getElementById("emptyFeed");

// ---------- Render Table ----------
function renderTable(){tableSkeleton.style.display="block"; tableBody.innerHTML=""; emptyTable.style.display="none";
setTimeout(()=>{tableSkeleton.style.display="none"; const start=(currentPage-1)*rowsPerPage; const pageUsers=filteredUsers.slice(start,start+rowsPerPage);
if(pageUsers.length===0){emptyTable.style.display="block";}else{pageUsers.forEach(user=>{const tr=document.createElement("tr"); tr.classList.add("added");
tr.innerHTML=`<td>${user.id}</td><td>${user.name}</td><td>${user.location}</td><td>${user.device}</td><td>${user.sessionTime}</td><td>${user.actions}</td><td>${user.status}</td>`;
tableBody.appendChild(tr); setTimeout(()=>tr.classList.remove("added"),400);});}
pageInfo.textContent=`Page ${currentPage} of ${Math.ceil(filteredUsers.length/rowsPerPage)}`;},300);}

// ---------- Render Feed ----------
function renderFeed(){feedSkeleton.style.display="block"; feed.innerHTML=""; emptyFeed.style.display="none";
setTimeout(()=>{feedSkeleton.style.display="none"; const lastEvents=events.slice(-20).reverse();
if(lastEvents.length===0){emptyFeed.style.display="block";}else{lastEvents.forEach(ev=>{const div=document.createElement("div"); div.className=`activity-item added ${ev.type}`; div.innerHTML=`<span>${ev.message}</span> <span class="time">${ev.time.toLocaleTimeString()}</span>`; feed.appendChild(div); setTimeout(()=>div.classList.remove("added"),400);});}},300);}

// ---------- Pagination ----------
document.getElementById("prevPage").addEventListener("click",()=>{if(currentPage>1){currentPage--;renderTable();}});
document.getElementById("nextPage").addEventListener("click",()=>{if(currentPage<Math.ceil(filteredUsers.length/rowsPerPage)){currentPage++;renderTable();}});

// ---------- Search ----------
document.getElementById("searchInput").addEventListener("input",e=>{const q=e.target.value.toLowerCase();
filteredUsers=users.filter(u=>u.name.toLowerCase().includes(q)||u.location.toLowerCase().includes(q));
currentPage=1; renderTable();});

// ---------- Sorting ----------
document.querySelectorAll("#userTable th").forEach(th=>{th.addEventListener("click",()=>{const col=th.dataset.column; const asc=th.classList.contains("sort-asc");
filteredUsers.sort((a,b)=>{if(a[col]<b[col])return asc?1:-1;if(a[col]>b[col])return asc?-1:1;return 0;});
th.classList.toggle("sort-asc",!asc); th.classList.toggle("sort-desc",asc); renderTable();});});

// ---------- CSV Export ----------
document.getElementById("exportBtn").addEventListener("click",()=>{let csv="User ID,Name,Location,Device,Session Time,Actions,Status\n";
filteredUsers.forEach(u=>{csv+=`${u.id},${u.name},${u.location},${u.device},${u.sessionTime},${u.actions},${u.status}\n`;});
const blob=new Blob([csv],{type:"text/csv"}); const url=URL.createObjectURL(blob); const a=document.createElement("a");
a.href=url; a.download="users.csv"; a.click(); URL.revokeObjectURL(url);});

// ---------- Live Feed Simulation ----------
setInterval(()=>{const types=["signup","quiz","purchase"], messages=["New user signed up","Quiz completed","Purchase made"], idx=Math.floor(Math.random()*3);
events.push({type:types[idx], message:messages[idx], time:new Date()}); if(events.length>50)events.shift(); renderFeed();},5000);

// ---------- Animated Row Updates ----------
function updateRandomUser(){if(filteredUsers.length===0)return;
const start=(currentPage-1)*rowsPerPage; const pageUsers=filteredUsers.slice(start,start+rowsPerPage); const randIdx=Math.floor(Math.random()*pageUsers.length);
const user=pageUsers[randIdx]; user.sessionTime=`${10+Math.floor(Math.random()*50)} mins`; user.actions=Math.floor(Math.random()*10);
user.status=["Active","Inactive"][Math.floor(Math.random()*2)];
const tr=tableBody.querySelectorAll("tr")[randIdx]; tr.innerHTML=`<td>${user.id}</td><td>${user.name}</td><td>${user.location}</td><td>${user.device}</td><td>${user.sessionTime}</td><td>${user.actions}</td><td>${user.status}</td>`;
tr.classList.add("updated"); setTimeout(()=>tr.classList.remove("updated"),1000);}
setInterval(updateRandomUser,7000);

// ---------- Initial Render ----------
renderTable(); renderFeed();
</script>
</body>
</html>
